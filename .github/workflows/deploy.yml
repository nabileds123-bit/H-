name: Deploy BubbleV2 to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh

          if [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          elif [ -n "$VPS_SSH_KEY_B64" ]; then
            printf '%s' "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "Missing VPS_SSH_KEY or VPS_SSH_KEY_B64 secret"
            exit 1
          fi

          chmod 600 ~/.ssh/deploy_key

          echo "=== Validate SSH key ==="
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_USER || 'root' }}@${{ secrets.VPS_HOST }}" <<'EOSSH'
            set -e

            APP_DIR="/var/www/bubblev2"
            APP_NAME="bubblev2"

            cd "$APP_DIR"

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install dependencies ==="
            npm install --omit=dev

            echo "=== Restart PM2 ==="
            pm2 restart "$APP_NAME" --update-env

            echo "=== Save PM2 ==="
            pm2 save

            echo "=== Deploy success ==="
          EOSSH
