name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" <<'EOSSH'
            set -e

            APP_DIR="/var/www/bubblev2"
            APP_NAME="bubblev2"
            NGINX_CONF="/etc/nginx/sites-available/bubblev2.site.conf"
            NGINX_ENABLED="/etc/nginx/sites-enabled/bubblev2.site.conf"

            cd "$APP_DIR"

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install dependencies ==="
            npm install --omit=dev

            echo "=== Apply Nginx config ==="
            sudo cp deploy/nginx-bubblev2.site.conf "$NGINX_CONF"
            sudo ln -sf "$NGINX_CONF" "$NGINX_ENABLED"
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=== Restart PM2 ==="
            pm2 restart "$APP_NAME" --update-env || pm2 start src/index.js --name "$APP_NAME" -- --game
            pm2 save

            echo "=== Deploy success ==="
          EOSSH
