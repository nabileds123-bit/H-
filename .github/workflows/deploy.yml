name: Deploy BubbleV2 to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 22 root@15.235.193.115 <<'EOSSH'
            set -e

            APP_DIR="/var/www/bubblev2"
            APP_NAME="bubblev2"
            NGINX_CONF="/etc/nginx/sites-available/bubblev2.site.conf"
            NGINX_ENABLED="/etc/nginx/sites-enabled/bubblev2.site.conf"
            NGINX_UPLOAD_LIMIT="/etc/nginx/conf.d/bubblev2-upload-limit.conf"

            cd "$APP_DIR"

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install dependencies ==="
            npm install --omit=dev

            echo "=== Apply Nginx config ==="
            cp deploy/nginx-bubblev2.site.conf "$NGINX_CONF"
            ln -sf "$NGINX_CONF" "$NGINX_ENABLED"
            printf 'client_max_body_size 6m;\n' > "$NGINX_UPLOAD_LIMIT"
            nginx -t
            systemctl reload nginx

            echo "=== Restart PM2 ==="
            pm2 restart "$APP_NAME" --update-env

            echo "=== Save PM2 ==="
            pm2 save

            echo "=== Deploy success ==="
          EOSSH
