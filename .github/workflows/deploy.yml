          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" <<'EOSSH'
            set -e

            APP_DIR="/var/www/bubblev2"
            APP_NAME="bubblev2"

            cd "$APP_DIR"

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install dependencies ==="
            npm install --omit=dev

            echo "=== Restart PM2 ==="
            pm2 restart "$APP_NAME" --update-env || pm2 start src/index.js --name "$APP_NAME" -- --game

            pm2 save

            echo "=== Deploy success ==="
          EOSSH