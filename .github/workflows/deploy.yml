name: Deploy BubbleV2 to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh

          if [ -n "$VPS_SSH_KEY" ]; then
            printf '%s\n' "$VPS_SSH_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "$VPS_SSH_KEY_B64" ]; then
            printf '%s' "$VPS_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          else
            echo "Missing VPS_SSH_KEY or VPS_SSH_KEY_B64 secret"
            exit 1
          fi

          chmod 600 ~/.ssh/deploy_key

          echo "=== Validate SSH key ==="
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Debug deploy target
        run: |
          echo "VPS_HOST length: $(printf '%s' '${{ secrets.VPS_HOST }}' | wc -c)"
          echo "VPS_PORT length: $(printf '%s' '${{ secrets.VPS_PORT }}' | wc -c)"
          echo "VPS_USER length: $(printf '%s' '${{ secrets.VPS_USER }}' | wc -c)"

      - name: Deploy to VPS
        run: |
          ssh -T -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            -p "${{ secrets.VPS_PORT || 22 }}" \
            "${{ secrets.VPS_USER || 'root' }}@${{ secrets.VPS_HOST }}" <<'EOSSH'
            set -e

            APP_DIR="/var/www/bubblev2"
            APP_NAME="bubblev2"

            echo "=== Connected to VPS ==="
            date
            whoami
            hostname

            cd "$APP_DIR"

            echo "=== Pull latest code ==="
            git remote -v
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline

            echo "=== Install dependencies ==="
            npm install --omit=dev --no-audit --no-fund

            echo "=== Restart PM2 ==="
            pm2 restart "$APP_NAME" --update-env

            echo "=== Save PM2 ==="
            pm2 save

            echo "=== Deploy success ==="
          EOSSH
