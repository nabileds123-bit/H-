<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bubble V2 Admin</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f4f6f8;color:#1f2933;font-family:Arial,sans-serif;font-size:14px}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .login{max-width:360px;margin:12vh auto;padding:22px;background:#fff;border:1px solid #d9e2ec;border-radius:6px;box-shadow:0 12px 28px rgba(15,23,42,.08)}
    .app{display:none;min-height:100vh}
    .top{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#17202a;color:#fff}
    .brand{font-weight:700}
    .layout{display:grid;grid-template-columns:236px minmax(0,1fr);height:calc(100vh - 52px);min-height:0}
    .nav{background:#fff;border-right:1px solid #d9e2ec;padding:12px;overflow:auto}
    .nav button{width:100%;height:36px;margin:2px 0;border:0;background:transparent;text-align:left;color:#334e68;border-radius:4px;padding:0 10px}
    .nav button.active,.nav button:hover{background:#e6f0ff;color:#0b5cad}
    .main{display:flex;flex-direction:column;gap:10px;padding:16px;min-width:0;min-height:0}
    .main h2{margin:0;font-size:20px;line-height:1.3}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .toolbar input{height:34px;flex:1;min-width:220px;border:1px solid #bcccdc;border-radius:4px;padding:0 10px}
    .btn{height:34px;border:1px solid #2f80ed;border-radius:4px;background:#2f80ed;color:#fff;padding:0 12px;cursor:pointer}
    .btn.secondary{border-color:#9fb3c8;background:#fff;color:#334e68}
    .btn.danger{border-color:#d64545;background:#d64545}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .panel{background:#fff;border:1px solid #d9e2ec;border-radius:6px;overflow:auto;min-height:220px;max-height:calc(100vh - 174px)}
    table{width:100%;min-width:980px;border-collapse:collapse;font-size:13px}
    th,td{padding:9px 10px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top}
    th{position:sticky;top:0;z-index:1;background:#f7fafc;color:#52606d;font-size:12px;text-transform:uppercase}
    td{max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    td.actions{white-space:nowrap;width:120px}
    .empty{text-align:center;color:#829ab1;padding:28px}
    .status{min-height:20px;margin:0;color:#52606d}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20}
    .modal.open{display:flex;align-items:flex-start;justify-content:center;padding:20px 12px}
    .dialog{width:min(760px,calc(100vw - 24px));max-height:calc(100vh - 40px);display:flex;flex-direction:column;background:#fff;border-radius:6px;box-shadow:0 18px 50px rgba(15,23,42,.22);overflow:hidden}
    .dialog-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e4e7eb}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;overflow:auto}
    .field{display:flex;flex-direction:column;gap:5px}
    .field.full{grid-column:1/-1}
    .field label{font-size:12px;color:#52606d;font-weight:700}
    .field input,.field select,.field textarea{width:100%;border:1px solid #bcccdc;border-radius:4px;padding:8px}
    .field textarea{min-height:110px;resize:vertical}
    .dialog-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 16px;border-top:1px solid #e4e7eb}
    @media(max-width:760px){.layout{grid-template-columns:1fr;height:auto}.nav{display:flex;gap:6px;overflow:auto;border-right:0;border-bottom:1px solid #d9e2ec}.nav button{width:auto;white-space:nowrap}.main{min-height:calc(100vh - 112px)}.panel{max-height:calc(100vh - 210px)}.form{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <h2>Bubble V2 Admin</h2>
    <div class="field"><label>Username</label><input id="loginUser" value="admin"></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password"></div>
    <p id="loginStatus" class="status"></p>
    <button id="loginBtn" class="btn">Login</button>
  </div>

  <div id="app" class="app">
    <div class="top"><div class="brand">Bubble V2 Admin</div><button id="logoutBtn" type="button" class="btn secondary">Logout</button></div>
    <div class="layout">
      <div id="nav" class="nav"></div>
      <main class="main">
        <h2 id="title"></h2>
        <div class="toolbar"><input id="search" placeholder="Search"><button id="addBtn" type="button" class="btn">Add</button><button id="reloadBtn" type="button" class="btn secondary">Reload</button></div>
        <p id="status" class="status"></p>
        <div class="panel"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
      </main>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="dialog">
      <div class="dialog-head"><strong id="modalTitle"></strong><button id="closeModal" type="button" class="btn secondary">Close</button></div>
      <form id="form" class="form"></form>
      <div class="dialog-foot"><button id="deleteBtn" type="button" class="btn danger">Delete</button><button id="saveBtn" type="button" class="btn">Save</button></div>
    </div>
  </div>

  <script>
    var modules = {
      users:{title:'User / Account',endpoint:'users',columns:['username','email','accountType','commandRole','points','level','rankedTier','rankedWins','rankedLosses','rankedProgress','guildTag','banned'],fields:[
        ['username','Username'],['email','Email'],['password','Password Baru','password'],['emailVerified','Email Verified','checkbox'],['accountType','Account Type','select',['Free','Premium']],['commandRole','Command Role','select',['','Moderator','Admin']],['commandMass','Command: Mass','checkbox'],['commandColor','Command: Color','checkbox'],['commandMerge','Command: Merge','checkbox'],['commandTp','Command: Teleport','checkbox'],['commandSplit','Command: Split','checkbox'],['commandName','Command: Name','checkbox'],['commandPoint','Command: Point','checkbox'],['commandKick','Command: Kick','checkbox'],['commandBan','Command: Ban','checkbox'],['commandSay','Command: Say','checkbox'],['commandKillall','Command: Kill All','checkbox'],['commandPlayerlist','Command: Player List','checkbox'],['commandStatus','Command: Status','checkbox'],['commandPermissions','Command Permissions Legacy','textarea'],['premiumChatColor','Premium Chat Color'],['premiumChatBadge','Premium Chat Badge'],['premiumChatEffect','Premium Chat Effect','select',['','bull','love','lightning','fire','star','crown','confetti','waterfall']],['premiumUntil','Premium Until'],['points','Points','number'],['rankedWins','Ranked Wins','number'],['rankedLosses','Ranked Losses','number'],['rankedProgress','Ranked Progress','number'],['rankedTier','Ranked Tier','select',['UNRANKED','I','II','III','IV','V','VI','VII','VII_STAR_2','VII_STAR_3','VII_STAR_4','VII_STAR_5']],['rankedModeStats','Ranked Mode Stats JSON','textarea'],['xp','XP','number'],['xpMax','XP Max','number'],['level','Level','number'],['battleTier','Battle Tier Legacy','select',['UNRANKED','I','II','III','IV','V','VI','VII','VII_STAR_2','VII_STAR_3','VII_STAR_4','VII_STAR_5']],['cellColor','Cell Color','select',['#000000','#36D2D6','#800080','#800000','#FFFFFF']],['hideNickname','Hide Nickname','checkbox'],['guildTag','Guild Tag'],['skin','Skin'],['skinUrl','Player Skin URL'],['skinPath','Player Skin Path'],['activeSkinType','Active Skin','select',['player','guild']],['guildSkinUrl','Guild Skin URL'],['guildSkinPath','Guild Skin Path'],['banned','Banned','checkbox'],['banReason','Ban Reason','textarea']
      ]},
      config:{title:'Server Config',endpoint:'config',columns:['key','value'],fields:[['key','Key'],['value','Value']]},
      premium:{title:'Premium',endpoint:'premium',columns:['username','type','startsAt','endsAt','active'],fields:[['username','Username'],['type','Type','select',['Premium','VIP','Moderator']],['startsAt','Starts At'],['endsAt','Ends At'],['active','Active','checkbox'],['notes','Notes','textarea']]},
      points:{title:'Points',endpoint:'points',columns:['username','amount','balanceBefore','balanceAfter','reason','createdAt'],fields:[['username','Username / Email / ID'],['amount','Amount','number'],['reason','Reason'],['createdAt','Created At'],['notes','Notes','textarea']]},
      skins:{title:'Skins',endpoint:'skins',columns:['username','name','file','status'],fields:[['username','Username'],['name','Skin Name'],['file','File'],['status','Status','select',['pending','approved','rejected']],['notes','Notes','textarea']]},
      guilds:{title:'Guild',endpoint:'guilds',columns:['name','tag','type','leader','members','logo','membersList'],fields:[['name','Guild Name'],['tag','Tag'],['type','Type','select',['private','public']],['leader','Leader Username'],['leaderLevel','Leader Level','number'],['members','Members Count','number'],['logo','Logo URL'],['guildSkinUrl','Guild Skin URL'],['membersList','Members JSON or lines: name|role|level','textarea'],['description','Description','textarea'],['logs','Logs','textarea']]},
      notifications:{title:'Notification',endpoint:'notifications',columns:['title','target','active','createdAt'],fields:[['title','Title'],['message','Message','textarea'],['target','Target','select',['all','user','guild']],['targetId','Target ID'],['active','Active','checkbox'],['createdAt','Created At']]},
      highscores:{title:'Highscore',endpoint:'highscores',columns:['username','mode','period','score'],fields:[['username','Username'],['mode','Mode','select',['FFA - X5','FFA - Hardcore','1vs1','2vs2']],['period','Period','select',['today','week','month','global']],['score','Score','number'],['time','Time'],['country','Country']]},
      battleMatches:{title:'Battle Match',endpoint:'battleMatches',columns:['mode','status','teamA','teamB','score'],fields:[['mode','Mode','select',['1vs1','2vs2']],['status','Status','select',['waiting','live','finished','cancelled']],['teamA','Team A'],['teamB','Team B'],['score','Score'],['reward','Reward','number'],['startedAt','Started At'],['endedAt','Ended At']]},
      guildWithdrawals:{title:'Guild Withdraw Requests',endpoint:'guildWithdrawals',columns:['guildTag','guildName','leader','month','points','status','discordUrl','createdAt'],fields:[['guildTag','Guild Tag'],['guildName','Guild Name'],['leader','Leader'],['leaderId','Leader ID'],['month','Month'],['points','Points','number'],['status','Status','select',['pending_admin','approved','rejected','paid']],['discordUrl','Discord URL'],['notes','Notes','textarea']]},
      top1Stats:{title:'Player Top1 Time Stats',endpoint:'top1',readonly:true,columns:['rank','username','mode','top1Time','top1Ms'],fields:[]},
      battleStats:{title:'Battle Win/Lose Stats',endpoint:'battle',readonly:true,columns:['rank','username','guildId','mode','win','lose','winRate','totalMatch'],fields:[]},
      guildStats:{title:'Guild Top1 Reward Stats',endpoint:'guild-stats',readonly:true,columns:['guildId','name','tag','members','guildPoint','top1Time','top1Ms'],fields:[]},
      auditLogs:{title:'Stats Audit Log',endpoint:'audit-logs',readonly:true,columns:['created_at','admin_user_id','action','target_type','target_id','reason'],fields:[]}
    };
    var current = 'users';
    var items = [];
    var editing = null;

    function api(path, options) {
      options = options || {};
      options.headers = Object.assign({'Content-Type':'application/json'}, options.headers || {});
      return fetch(path, options).then(function(res){ return res.json().then(function(body){ if(!res.ok) throw body; return body; }); });
    }
    function text(value) { return value == null ? '' : String(value); }
    function esc(value) { return text(value).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
    function setStatus(message, error) { var el=document.getElementById('status'); el.style.color=error?'#b42318':'#52606d'; el.textContent=message||''; }
    function updateUrlState() {
      var params = new URLSearchParams(window.location.search || '');
      params.set('module', current);
      var search = document.getElementById('search').value.trim();
      if (search) params.set('search', search);
      else params.delete('search');
      window.history.replaceState(null, '', window.location.pathname + '?' + params.toString());
    }
    function applyUrlState() {
      var params = new URLSearchParams(window.location.search || '');
      var moduleName = params.get('module');
      if (moduleName && modules[moduleName]) current = moduleName;
      if (params.get('search')) document.getElementById('search').value = params.get('search');
    }
    function showApp() { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='block'; applyUrlState(); load(current); }
    function showLogin() { document.getElementById('login').style.display='block'; document.getElementById('app').style.display='none'; }
    function renderNav() {
      var nav = document.getElementById('nav');
      nav.innerHTML = Object.keys(modules).map(function(key){ return '<button data-module="'+key+'" class="'+(key===current?'active':'')+'">'+modules[key].title+'</button>'; }).join('');
    }
    function load(key) {
      current = key || current;
      updateUrlState();
      renderNav();
      document.getElementById('title').textContent = modules[current].title;
      document.getElementById('addBtn').style.display = modules[current].readonly ? 'none' : '';
      setStatus('Loading...');
      api('/api/admin/' + modules[current].endpoint).then(function(data){ items = data.items || []; renderTable(); }).catch(function(err){ setStatus(err.message || 'Load failed.', true); });
    }
    function renderTable() {
      var mod = modules[current];
      var q = document.getElementById('search').value.toLowerCase();
      var filtered = items.filter(function(item){ return JSON.stringify(item).toLowerCase().indexOf(q) !== -1; });
      document.getElementById('thead').innerHTML = '<tr>' + mod.columns.map(function(c){return '<th>'+esc(c)+'</th>';}).join('') + (mod.readonly ? '' : '<th>Actions</th>') + '</tr>';
      document.getElementById('tbody').innerHTML = filtered.length ? filtered.map(function(item){
        return '<tr>' + mod.columns.map(function(c){return '<td title="'+esc(item[c])+'">'+esc(item[c])+'</td>';}).join('') + (mod.readonly ? '' : '<td class="actions"><button type="button" class="btn secondary" data-edit="'+esc(item.id)+'">Edit</button></td>') + '</tr>';
      }).join('') : '<tr><td class="empty" colspan="'+(mod.columns.length + (mod.readonly ? 0 : 1))+'">No data found.</td></tr>';
      setStatus(filtered.length + ' shown from ' + items.length + ' item.');
    }
    function openModal(item) {
      editing = item || null;
      document.getElementById('modalTitle').textContent = (editing ? 'Edit ' : 'Add ') + modules[current].title;
      document.getElementById('deleteBtn').style.display = editing ? '' : 'none';
      document.getElementById('form').innerHTML = modules[current].fields.map(function(field){
        var key=field[0], label=field[1], type=field[2] || 'text', options=field[3] || [], value=editing ? editing[key] : '';
        if (type === 'checkbox') return '<div class="field"><label>'+esc(label)+'</label><select name="'+key+'"><option value="false">No</option><option value="true" '+(value===true?'selected':'')+'>Yes</option></select></div>';
        if (type === 'select') return '<div class="field"><label>'+esc(label)+'</label><select name="'+key+'">'+options.map(function(opt){return '<option value="'+esc(opt)+'" '+(String(value)===String(opt)?'selected':'')+'>'+esc(opt)+'</option>';}).join('')+'</select></div>';
        if (type === 'textarea') {
          if (value && typeof value === 'object') value = JSON.stringify(value, null, 2);
          return '<div class="field full"><label>'+esc(label)+'</label><textarea name="'+key+'">'+esc(value)+'</textarea></div>';
        }
        return '<div class="field"><label>'+esc(label)+'</label><input name="'+key+'" type="'+type+'" value="'+esc(value)+'"></div>';
      }).join('');
      document.getElementById('modal').classList.add('open');
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); editing = null; }
    function formData() {
      var data = {};
      Array.prototype.forEach.call(document.getElementById('form').elements, function(el){
        if (!el.name) return;
        if (el.value === '' && el.name === 'password') return;
        if (el.value === 'true') data[el.name] = true;
        else if (el.value === 'false') data[el.name] = false;
        else data[el.name] = el.type === 'number' ? Number(el.value || 0) : el.value;
      });
      return data;
    }
    function save() {
      document.getElementById('saveBtn').disabled = true;
      var endpoint = '/api/admin/' + modules[current].endpoint + (editing ? '/' + encodeURIComponent(editing.id) : '');
      api(endpoint, {method: editing ? 'PUT' : 'POST', body: JSON.stringify(formData())}).then(function(){ closeModal(); load(current); }).catch(function(err){ setStatus(err.message || 'Save failed.', true); }).finally(function(){ document.getElementById('saveBtn').disabled = false; });
    }
    function remove() {
      if (!editing || !confirm('Delete this item?')) return;
      api('/api/admin/' + modules[current].endpoint + '/' + encodeURIComponent(editing.id), {method:'DELETE'}).then(function(){ closeModal(); load(current); }).catch(function(err){ setStatus(err.message || 'Delete failed.', true); });
    }
    document.getElementById('loginBtn').onclick = function(){
      api('/api/admin/login', {method:'POST', body:JSON.stringify({username:document.getElementById('loginUser').value,password:document.getElementById('loginPass').value})}).then(showApp).catch(function(err){document.getElementById('loginStatus').textContent=err.message||'Login failed.';});
    };
    document.getElementById('logoutBtn').onclick = function(){ api('/api/admin/logout',{method:'POST',body:'{}'}).then(showLogin); };
    document.getElementById('nav').onclick = function(e){ if(e.target.dataset.module) load(e.target.dataset.module); };
    document.getElementById('addBtn').onclick = function(){ openModal(null); };
    document.getElementById('reloadBtn').onclick = function(){ load(current); };
    document.getElementById('search').oninput = function(){ updateUrlState(); renderTable(); };
    document.getElementById('tbody').onclick = function(e){ if(e.target.dataset.edit) openModal(items.filter(function(item){return String(item.id)===String(e.target.dataset.edit);})[0]); };
    document.getElementById('closeModal').onclick = closeModal;
    document.getElementById('saveBtn').onclick = save;
    document.getElementById('deleteBtn').onclick = remove;
    document.getElementById('form').onsubmit = function(e){ e.preventDefault(); save(); };
    document.getElementById('modal').onclick = function(e){ if(e.target.id === 'modal') closeModal(); };
    document.onkeydown = function(e){ if(e.key === 'Escape') closeModal(); };
    api('/api/admin/session').then(function(data){ data.authenticated ? showApp() : showLogin(); }).catch(showLogin);
  </script>
</body>
</html>
